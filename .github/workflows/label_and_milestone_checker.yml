name: Labels and citation checks
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
  merge_group: # to be prepared on merge queue
    types: [checks_requested]

jobs:
  check_labels:
    if: (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'ready to merge'))
    name: Check ready-to-merge PR has at least one type label
    runs-on: ubuntu-slim
    steps:
      - name: Check labels
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          allowed_labels="bugfix feature documentation performance enhancement maintenance"

          labels="$(gh api "/repos/${REPO}/pulls/${PR_NUMBER}" --jq '.labels[].name' || true)"

          echo "PR labels:"
          echo "$labels"

          for label in $labels; do
            for allowed in $allowed_labels; do
              if [ "$label" = "$allowed" ]; then
                echo "Found allowed label: $label"
                exit 0
              fi
            done
          done

          echo "ERROR: PR must have at least one of these labels:"
          echo "  $allowed_labels"
          exit 1

  check_citation_cff_for_pr_author:
    name: Check PR author is in CITATION.cff
    if: (github.event_name == 'pull_request')
    runs-on: ubuntu-slim
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
          sparse-checkout: 'CITATION.cff'
          sparse-checkout-cone-mode: false
      - name: Verify PR author exists in CITATION.cff
        env:
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          echo "PR author: $PR_AUTHOR"
          if [[ "$PR_AUTHOR" == *"[bot]" || "$PR_AUTHOR" == "napari-bot" ]]; then
            echo "Bot author '$PR_AUTHOR' detected. Skipping CITATION.cff check."
            exit 0
          fi
          if grep -Ei "^[[:space:]]*alias:[[:space:]]*${PR_AUTHOR}[[:space:]]*$" CITATION.cff; then
            echo "Found alias '$PR_AUTHOR' in CITATION.cff."
          else
            echo "ERROR: GitHub username '$PR_AUTHOR' not found as an alias in CITATION.cff under authors."
            echo "You are welcome to modify this PR to include your authorship in CITATION.cff;"
            echo "citations for community contributors are listed in alphabetical order by family-names."
            echo "Otherwise, a napari core team member will request this information from you."
            printf '%s\n' "Citation format example:" \
            '```yaml' \
            "- given-names: <first name>" \
            "  family-names: <last name>" \
            "  affiliation: <required> (e.g. napari University)" \
            "  orcid: https://orcid.org/<ORCID> <optional>" \
            "  alias: ${PR_AUTHOR}" \
            '```'
            exit 1
          fi
